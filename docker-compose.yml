services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anomaly-detection-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/status')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - anomaly-network

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anomaly-detection-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - anomaly-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: anomaly-detection-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - anomaly-network
    command: redis-server --appendonly yes

volumes:
  redis-data:

networks:
  anomaly-network:
    driver: bridge
