services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anomaly-detection-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - anomaly-network

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anomaly-detection-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - anomaly-network

networks:
  anomaly-network:
    driver: bridge
